<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Napoleone</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">← Torna al Sito</a></li>
            <li><a href="sfondo.html">Visualizza Sfondo</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Pannello Admin</h1>
        <p>Configura sfondo e musica</p>

        <section>
            <h2>Sfondo</h2>

            <div class="admin-section">
                <div class="admin-form-group">
                    <label>Tipo</label>
                    <select id="bgType" onchange="updateBgPreview()">
                        <option value="color">Colore</option>
                        <option value="gradient">Gradiente</option>
                        <option value="image">Immagine URL</option>
                    </select>
                </div>

                <div id="bgColorSection" class="admin-form-group">
                    <label>Colore</label>
                    <input type="color" id="bgColor" value="#F5F2E8" onchange="updateBgPreview()">
                </div>

                <div id="bgGradientSection" class="admin-form-group" style="display:none;">
                    <label>Colore 1</label>
                    <input type="color" id="bgGradient1" value="#002395" onchange="updateBgPreview()">
                    <label>Colore 2</label>
                    <input type="color" id="bgGradient2" value="#ED2939" onchange="updateBgPreview()">
                </div>

                <div id="bgImageSection" class="admin-form-group" style="display:none;">
                    <label>URL Immagine</label>
                    <input type="url" id="bgImage" placeholder="https://..." onchange="updateBgPreview()">
                </div>

                <div class="admin-form-group">
                    <label>Anteprima</label>
                    <div id="bgPreview" style="width:100%; height:120px; border:1px solid #ccc;"></div>
                </div>
            </div>
        </section>

        <section>
            <h2>Musica</h2>

            <div class="admin-section">
                <div class="admin-form-group">
                    <label>URL Audio (MP3/OGG/WAV)</label>
                    <input type="url" id="musicUrl" placeholder="https://...">
                </div>

                <div class="admin-form-group">
                    <label>Volume: <span id="volumeValue">50%</span></label>
                    <input type="range" id="musicVolume" min="0" max="100" value="50" oninput="document.getElementById('volumeValue').textContent=this.value+'%'">
                </div>

                <div class="admin-form-group">
                    <label><input type="checkbox" id="musicAutoplay"> Autoplay</label>
                </div>

                <div class="admin-form-group">
                    <label><input type="checkbox" id="musicLoop" checked> Loop</label>
                </div>
            </div>
        </section>

        <section>
            <h2>Testo Sfondo</h2>

            <div class="admin-section">
                <div class="admin-form-group">
                    <label>Titolo</label>
                    <input type="text" id="customTitle" placeholder="Napoleone Bonaparte">
                </div>

                <div class="admin-form-group">
                    <label>Sottotitolo</label>
                    <input type="text" id="customSubtitle" placeholder="1769 - 1821">
                </div>
            </div>
        </section>

        <section>
            <button onclick="saveSettings()">Salva</button>
            <button onclick="resetSettings()">Reset</button>
            <a href="sfondo.html"><button type="button">Vedi Sfondo</button></a>
        </section>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', loadSettings);

        function updateBgPreview() {
            const type = document.getElementById('bgType').value;
            const preview = document.getElementById('bgPreview');
            
            document.getElementById('bgColorSection').style.display = type === 'color' ? 'block' : 'none';
            document.getElementById('bgGradientSection').style.display = type === 'gradient' ? 'block' : 'none';
            document.getElementById('bgImageSection').style.display = type === 'image' ? 'block' : 'none';
            
            if (type === 'color') {
                preview.style.background = document.getElementById('bgColor').value;
            } else if (type === 'gradient') {
                preview.style.background = 'linear-gradient(135deg, ' + document.getElementById('bgGradient1').value + ', ' + document.getElementById('bgGradient2').value + ')';
            } else {
                const url = document.getElementById('bgImage').value;
                preview.style.background = url ? "url('" + url + "') center/cover" : '#ccc';
            }
        }

        function saveSettings() {
            const settings = {
                bgType: document.getElementById('bgType').value,
                bgColor: document.getElementById('bgColor').value,
                bgGradient1: document.getElementById('bgGradient1').value,
                bgGradient2: document.getElementById('bgGradient2').value,
                bgImage: document.getElementById('bgImage').value,
                musicUrl: document.getElementById('musicUrl').value,
                musicVolume: document.getElementById('musicVolume').value,
                musicAutoplay: document.getElementById('musicAutoplay').checked,
                musicLoop: document.getElementById('musicLoop').checked,
                customTitle: document.getElementById('customTitle').value,
                customSubtitle: document.getElementById('customSubtitle').value
            };
            localStorage.setItem('napoleonSettings', JSON.stringify(settings));
            alert('Salvato!');
        }

        function loadSettings() {
            const s = JSON.parse(localStorage.getItem('napoleonSettings') || '{}');
            if (s.bgType) {
                document.getElementById('bgType').value = s.bgType;
                document.getElementById('bgColor').value = s.bgColor || '#F5F2E8';
                document.getElementById('bgGradient1').value = s.bgGradient1 || '#002395';
                document.getElementById('bgGradient2').value = s.bgGradient2 || '#ED2939';
                document.getElementById('bgImage').value = s.bgImage || '';
                document.getElementById('musicUrl').value = s.musicUrl || '';
                document.getElementById('musicVolume').value = s.musicVolume || 50;
                document.getElementById('volumeValue').textContent = (s.musicVolume || 50) + '%';
                document.getElementById('musicAutoplay').checked = s.musicAutoplay || false;
                document.getElementById('musicLoop').checked = s.musicLoop !== false;
                document.getElementById('customTitle').value = s.customTitle || '';
                document.getElementById('customSubtitle').value = s.customSubtitle || '';
                updateBgPreview();
            }
        }

        function resetSettings() {
            localStorage.removeItem('napoleonSettings');
            location.reload();
        }
    </script>
</body>
</html>
