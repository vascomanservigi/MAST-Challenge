<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sfondo – Napoleone</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .api-box {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: #ffffff;
            padding: 24px;
            border-radius: 12px;
            max-width: 350px;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .api-box h2 {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #c9a227;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .api-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        .api-label {
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
        }
        
        .api-value {
            color: #ffffff;
            font-weight: 600;
            text-align: right;
            max-width: 200px;
            word-wrap: break-word;
        }
        
        .api-thought {
            background: rgba(201, 162, 39, 0.1);
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            border-left: 3px solid #c9a227;
        }
        
        .api-thought-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #c9a227;
            margin-bottom: 6px;
        }
        
        .api-thought-text {
            font-style: italic;
            color: #ffffff;
            font-size: 15px;
            line-height: 1.4;
        }
        
        .api-status {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
        }
        
        .loading {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            padding: 20px;
        }
        
        .error {
            color: #ff6b6b;
            text-align: center;
            padding: 20px;
            font-size: 13px;
        }
    </style>
</head>
<body class="sfondo-page" id="bg" onclick="handleClick(event)">
    
    <a href="index.html" class="home-link" onclick="event.stopPropagation()">← Home</a>
    
    <div class="api-box" id="apiBox" onclick="event.stopPropagation()">
        <h2>Mente di Napoleone</h2>
        <div id="apiContent">
            <div class="loading">In attesa dati dal robot...</div>
        </div>
    </div>
    
    <script>
        // CONFIGURAZIONE ENDPOINT API
        // Modifica questo URL con l'endpoint del tuo software esterno
        const API_ENDPOINT = localStorage.getItem('api_endpoint') || 'http://localhost:3000/api';
        
        var lastBg = null;

        function loadBackground() {
            var bg = localStorage.getItem('bg');
            
            if (bg !== lastBg) {
                lastBg = bg;
                var el = document.getElementById('bg');
                
                if (bg && bg !== '') {
                    el.style.backgroundImage = 'url(' + bg + ')';
                    el.style.backgroundColor = '';
                } else {
                    el.style.backgroundImage = '';
                    el.style.background = 'linear-gradient(135deg, #2b1810, #8b4513)';
                }
            }
        }

        function loadAPI() {
            fetch(API_ENDPOINT)
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.json();
                })
                .then(data => {
                    renderAPI(data);
                })
                .catch(error => {
                    document.getElementById('apiContent').innerHTML = 
                        '<div class="error">Robot offline<br><small>' + API_ENDPOINT + '</small></div>';
                });
        }

        function renderAPI(data) {
            try {
                var items = '';
                
                // Renderizza tutte le proprietà del JSON
                for (var key in data) {
                    if (key === 'pensiero' || key === 'thought') continue;
                    
                    var value = data[key];
                    if (typeof value === 'object') {
                        value = JSON.stringify(value);
                    }
                    
                    items += `
                        <div class="api-item">
                            <span class="api-label">${formatLabel(key)}</span>
                            <span class="api-value">${value}</span>
                        </div>
                    `;
                }
                
                // Se c'è un pensiero, mostralo in evidenza
                var thought = data.pensiero || data.thought || data.thinking;
                var thoughtHTML = '';
                
                if (thought) {
                    thoughtHTML = `
                        <div class="api-thought">
                            <div class="api-thought-label">Pensiero</div>
                            <div class="api-thought-text">"${thought}"</div>
                        </div>
                    `;
                }
                
                var status = `<div class="api-status">Aggiornato: ${new Date().toLocaleTimeString('it-IT')}</div>`;
                
                document.getElementById('apiContent').innerHTML = items + thoughtHTML + status;
            } catch (e) {
                document.getElementById('apiContent').innerHTML = '<div class="error">Errore parsing JSON</div>';
            }
        }

        function formatLabel(key) {
            return key
                .replace(/_/g, ' ')
                .replace(/([A-Z])/g, ' $1')
                .split(' ')
                .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
                .join(' ');
        }

        function handleClick(event) {
            if (event.target.closest('.api-box')) return;
            window.location.href = 'index.html';
        }

        // Carica immediatamente
        loadBackground();
        loadAPI();

        // AGGIORNAMENTO IN TEMPO REALE
        // Background: ogni 200ms
        setInterval(loadBackground, 200);
        
        // API: ogni 100ms (10 volte al secondo per tempo reale)
        setInterval(loadAPI, 100);

        // Ascolta eventi storage e focus
        window.addEventListener('storage', loadBackground);
        window.addEventListener('focus', loadBackground);
    </script>
</body>
</html>
