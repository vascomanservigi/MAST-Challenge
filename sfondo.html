<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sfondo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body id="backgroundPage">
    <a href="index.html" class="home-btn">← Home</a>

    <div style="text-align:center; padding:60px; background:rgba(0,0,0,0.5);">
        <h1 id="displayTitle" style="color:#fff; font-size:48px;"></h1>
        <p id="displaySubtitle" style="color:#fff; font-size:24px;"></p>
    </div>

    <div id="musicControls" class="music-controls" style="display:none;">
        <button id="playPauseBtn" onclick="toggleMusic()">▶ Play</button>
        <input type="range" id="volumeSlider" min="0" max="100" value="50" onchange="changeVolume()">
    </div>

    <audio id="bgMusic"></audio>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const s = JSON.parse(localStorage.getItem('napoleonSettings') || '{}');
            const page = document.getElementById('backgroundPage');
            const music = document.getElementById('bgMusic');
            const controls = document.getElementById('musicControls');

            // Sfondo
            if (s.bgType === 'color') {
                page.style.background = s.bgColor || '#F5F2E8';
            } else if (s.bgType === 'gradient') {
                page.style.background = 'linear-gradient(135deg, ' + (s.bgGradient1 || '#002395') + ', ' + (s.bgGradient2 || '#ED2939') + ')';
            } else if (s.bgType === 'image' && s.bgImage) {
                page.style.background = "url('" + s.bgImage + "') center/cover fixed";
            } else {
                page.style.background = 'linear-gradient(135deg, #002395, #ED2939)';
            }

            // Titoli
            document.getElementById('displayTitle').textContent = s.customTitle || 'Napoleone Bonaparte';
            document.getElementById('displaySubtitle').textContent = s.customSubtitle || '1769 - 1821';

            // Musica
            if (s.musicUrl) {
                music.src = s.musicUrl;
                music.volume = (s.musicVolume || 50) / 100;
                music.loop = s.musicLoop !== false;
                controls.style.display = 'block';
                document.getElementById('volumeSlider').value = s.musicVolume || 50;
                if (s.musicAutoplay) music.play().catch(function(){});
            }
        });

        function toggleMusic() {
            const m = document.getElementById('bgMusic');
            const b = document.getElementById('playPauseBtn');
            if (m.paused) { m.play(); b.textContent = '⏸ Pause'; }
            else { m.pause(); b.textContent = '▶ Play'; }
        }

        function changeVolume() {
            document.getElementById('bgMusic').volume = document.getElementById('volumeSlider').value / 100;
        }
    </script>
</body>
</html>
