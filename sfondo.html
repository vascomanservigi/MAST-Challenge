<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sfondo | Le Moniteur</title>
    <link rel="stylesheet" href="css/style.css">
    <style id="dynamicStyles"></style>
</head>
<body id="backgroundPage">
    <a href="index.html" class="home-btn" title="Torna alla Home">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9,22 9,12 15,12 15,22"/>
        </svg>
    </a>

    <div class="background-content">
        <div class="background-overlay">
            <h1 id="displayTitle"></h1>
            <p id="displaySubtitle"></p>
        </div>
    </div>

    <div class="music-controls" id="musicControls" style="display: none;">
        <button id="playPauseBtn" onclick="toggleMusic()">
            <svg id="playIcon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <polygon points="5,3 19,12 5,21"/>
            </svg>
            <svg id="pauseIcon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
                <rect x="6" y="4" width="4" height="16"/>
                <rect x="14" y="4" width="4" height="16"/>
            </svg>
        </button>
        <input type="range" id="volumeSlider" min="0" max="100" value="50" onchange="changeVolume()">
    </div>

    <audio id="bgMusic"></audio>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadBackground();
        });

        function loadBackground() {
            const settings = JSON.parse(localStorage.getItem('napoleonSettings') || '{}');
            const page = document.getElementById('backgroundPage');
            const title = document.getElementById('displayTitle');
            const subtitle = document.getElementById('displaySubtitle');
            const music = document.getElementById('bgMusic');
            const musicControls = document.getElementById('musicControls');

            // Sfondo
            if (settings.bgType === 'color') {
                page.style.background = settings.bgColor || '#F5F2E8';
            } else if (settings.bgType === 'gradient') {
                const c1 = settings.bgGradient1 || '#002395';
                const c2 = settings.bgGradient2 || '#ED2939';
                page.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
            } else if (settings.bgType === 'image' && settings.bgImage) {
                page.style.background = `url('${settings.bgImage}') center/cover fixed`;
            } else {
                page.style.background = 'linear-gradient(135deg, #002395, #ED2939)';
            }

            // Titolo
            title.textContent = settings.customTitle || 'Napoleone Bonaparte';
            subtitle.textContent = settings.customSubtitle || '1769 - 1821';

            // Musica
            if (settings.musicUrl) {
                music.src = settings.musicUrl;
                music.volume = (settings.musicVolume || 50) / 100;
                music.loop = settings.musicLoop !== false;
                musicControls.style.display = 'flex';
                document.getElementById('volumeSlider').value = settings.musicVolume || 50;

                if (settings.musicAutoplay) {
                    music.play().catch(e => console.log('Autoplay bloccato dal browser'));
                }
            }
        }

        function toggleMusic() {
            const music = document.getElementById('bgMusic');
            const playIcon = document.getElementById('playIcon');
            const pauseIcon = document.getElementById('pauseIcon');

            if (music.paused) {
                music.play();
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            } else {
                music.pause();
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            }
        }

        function changeVolume() {
            const music = document.getElementById('bgMusic');
            const volume = document.getElementById('volumeSlider').value;
            music.volume = volume / 100;
        }
    </script>

    <style>
        #backgroundPage {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
        }

        .home-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1A1A1A;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .home-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .background-content {
            text-align: center;
            z-index: 1;
        }

        .background-overlay {
            background: rgba(0, 0, 0, 0.5);
            padding: 60px 80px;
            border-radius: 4px;
        }

        .background-overlay h1 {
            font-size: clamp(2.5rem, 6vw, 5rem);
            color: white;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .background-overlay p {
            font-size: clamp(1rem, 2vw, 1.5rem);
            color: rgba(255, 255, 255, 0.8);
            font-style: italic;
        }

        .music-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }

        .music-controls button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #1A1A1A;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .music-controls button:hover {
            background: #8B0000;
            transform: scale(1.1);
        }

        .music-controls input[type="range"] {
            width: 100px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .background-overlay {
                padding: 40px;
                margin: 20px;
            }

            .music-controls {
                bottom: 10px;
                right: 10px;
                padding: 10px 15px;
            }
        }
    </style>
</body>
</html>
